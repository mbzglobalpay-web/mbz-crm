<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./app/" />
    <title>CRM МБЗ</title>
    <link rel="icon" href="./app/assets/favicon.ico" />
    <link rel="apple-touch-icon" href="./app/assets/apple-touch-icon.png" />
    <link rel="manifest" href="./app/manifest.webmanifest" />
    <meta name="theme-color" content="#071B3A" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #081425;
        color: #ffffff;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      a {
        color: #f1c766;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Открываем CRM МБЗ...</p>
      <p><a href="./app/">Перейти в CRM</a></p>
    </main>
    <script>
      const target = new URL("./app/", window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.href);
    </script>
  </body>
</html>
